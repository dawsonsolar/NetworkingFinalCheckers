<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Networked Checkers</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #1e1e1e;
    color: #ccc;
    font-family: monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }

  h1 {
    font-size: 1.1rem;
    color: #fff;
    margin-bottom: 4px;
    font-weight: normal;
  }

  #session-info {
    font-size: 0.75rem;
    color: #666;
    margin-bottom: 14px;
  }

  /* Modal */
  #modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.8);
    display: flex; align-items: center; justify-content: center;
    z-index: 10;
  }
  #modal {
    background: #2a2a2a;
    border: 1px solid #444;
    border-radius: 6px;
    padding: 24px;
    width: 320px;
    display: flex; flex-direction: column; gap: 10px;
  }
  #modal h2 { font-size: 1rem; color: #fff; font-weight: normal; }
  #modal input {
    background: #1e1e1e;
    border: 1px solid #444;
    border-radius: 4px;
    color: #ccc;
    font-family: monospace;
    font-size: 0.9rem;
    padding: 8px;
    outline: none;
  }
  #modal input:focus { border-color: #888; }
  #modal button {
    background: #3a7a3a;
    border: none; border-radius: 4px;
    color: #fff;
    font-family: monospace;
    font-size: 0.9rem;
    padding: 8px;
    cursor: pointer;
  }
  #modal button:hover { background: #4a9a4a; }

  /* Main layout */
  #game-area {
    display: flex;
    gap: 16px;
    align-items: flex-start;
  }

  /* Board */
  #board-wrap { display: flex; flex-direction: column; gap: 4px; }

  #col-labels {
    display: grid;
    grid-template-columns: 20px repeat(8, 56px);
    font-size: 0.7rem;
    color: #555;
    text-align: center;
  }

  .board-row {
    display: grid;
    grid-template-columns: 20px repeat(8, 56px);
  }

  .row-label {
    display: flex; align-items: center; justify-content: center;
    font-size: 0.7rem; color: #555;
  }

  .cell {
    width: 56px; height: 56px;
    display: flex; align-items: center; justify-content: center;
  }
  .cell.dark  { background: #5a3e2b; }
  .cell.light { background: #c4a87a; }
  .cell.dark.valid-move  { background: #3a6a3a; cursor: pointer; }
  .cell.dark.selected-sq { background: #7a6a2a; }

  .piece {
    width: 40px; height: 40px;
    border-radius: 50%;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.65rem;
    color: rgba(255,255,255,0.7);
    user-select: none;
  }
  .piece.p1 { background: #4a9a4a; border: 2px solid #2a6a2a; }
  .piece.p2 { background: #9a3a3a; border: 2px solid #6a1a1a; }
  .piece.selected { border: 2px solid #ddd; }
  .piece.king::after { content: 'K'; }

  /* Status */
  #status {
    margin-top: 10px;
    font-size: 0.85rem;
    color: #aaa;
    text-align: center;
    min-height: 1.2em;
  }
  #status.your-turn { color: #6a6; }
  #status.error     { color: #a66; }

  /* Message log */
  #log-panel {
    width: 220px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  #log-panel h3 {
    font-size: 0.75rem;
    color: #555;
    font-weight: normal;
    border-bottom: 1px solid #333;
    padding-bottom: 4px;
  }

  #log {
    background: #141414;
    border: 1px solid #333;
    border-radius: 4px;
    padding: 8px;
    height: 460px;
    overflow-y: auto;
    font-size: 0.7rem;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .log-entry {
    color: #555;
    word-break: break-all;
  }
  .log-entry.sent     { color: #5a8a5a; }
  .log-entry.received { color: #5a7aaa; }
  .log-entry.system   { color: #888; font-style: italic; }

  #log-legend {
    font-size: 0.65rem;
    color: #444;
    display: flex;
    gap: 10px;
  }
  .legend-sent     { color: #5a8a5a; }
  .legend-received { color: #5a7aaa; }
</style>
</head>
<body>

<div id="modal-overlay">
  <div id="modal">
    <h2>Networked Checkers</h2>
    <input id="name-input" type="text" placeholder="Your name" maxlength="20" autocomplete="off">
    <input id="session-input" type="text" placeholder="Session ID (optional, to reconnect)" maxlength="16" autocomplete="off">
    <button id="join-btn">Connect</button>
  </div>
</div>

<h1>Networked Checkers</h1>
<div id="session-info">session: <span id="sid">—</span> &nbsp; room: <span id="rid">—</span> &nbsp; you: P<span id="pnum">?</span></div>

<div id="game-area">
  <div>
    <div id="board-wrap">
      <div id="col-labels">
        <div></div>
        <div>0</div><div>1</div><div>2</div><div>3</div>
        <div>4</div><div>5</div><div>6</div><div>7</div>
      </div>
      <div id="board"></div>
    </div>
    <div id="status">Connecting...</div>
  </div>

  <div id="log-panel">
    <h3>Protocol log</h3>
    <div id="log"></div>
    <div id="log-legend">
      <span class="legend-sent">&#9650; sent</span>
      <span class="legend-received">&#9660; received</span>
    </div>
  </div>
</div>

<script>
// WebSocket URL - set to Render WSS URL when deployed to itch.io, blank = same host
const WS_SERVER = '';

function getWsUrl() {
  if (WS_SERVER) return WS_SERVER;
  return (location.protocol === 'https:' ? 'wss:' : 'ws:') + '//' + location.host;
}

// Game state
const state = {
  ws: null,
  playerNum: 0,
  myTurn: false,
  gameOver: false,
  board: Array.from({length: 8}, () => new Array(8).fill(0)),
  selectedRow: -1,
  selectedCol: -1,
  validDests: []
};

// Protocol log
function logMsg(text, type) {
  const log = document.getElementById('log');
  const entry = document.createElement('div');
  entry.className = 'log-entry ' + type;
  // Truncate long board strings so the log stays readable
  const display = text.length > 80 ? text.slice(0, 77) + '...' : text;
  entry.textContent = (type === 'sent' ? '> ' : type === 'received' ? '< ' : '  ') + display;
  log.appendChild(entry);
  log.scrollTop = log.scrollHeight;
}

// Modal
document.getElementById('join-btn').onclick = joinGame;
document.getElementById('name-input').addEventListener('keydown', e => { if (e.key === 'Enter') joinGame(); });

function joinGame() {
  const name = document.getElementById('name-input').value.trim() || 'Player';
  const session = document.getElementById('session-input').value.trim();
  document.getElementById('modal-overlay').style.display = 'none';
  connect(name, session);
}

// WebSocket connection
function connect(name, existingSession) {
  state.ws = new WebSocket(getWsUrl());

  state.ws.onopen = () => {
    logMsg('WebSocket connected', 'system');
    const msg = existingSession ? 'RECONNECT|' + existingSession : 'CONNECT|' + name;
    send(msg);
  };

  state.ws.onmessage = evt => {
    logMsg(evt.data, 'received');
    handleMessage(evt.data);
  };

  state.ws.onclose = () => {
    logMsg('Disconnected from server', 'system');
    setStatus('Disconnected. Reload to reconnect.', 'error');
  };
}

function send(msg) {
  if (state.ws && state.ws.readyState === WebSocket.OPEN) {
    state.ws.send(msg);
    logMsg(msg, 'sent');
  }
}

// Handle incoming server messages
function handleMessage(raw) {
  const parts = raw.split('|');
  switch (parts[0]) {
    case 'WELCOME':
      state.playerNum = parseInt(parts[2]);
      document.getElementById('sid').textContent  = parts[1];
      document.getElementById('rid').textContent  = parts[3];
      document.getElementById('pnum').textContent = parts[2];
      setStatus('Connected as P' + parts[2]);
      break;

    case 'WAITING':
      setStatus('Waiting for opponent...');
      break;

    case 'START':
      setStatus('Game started vs ' + parts[1]);
      break;

    case 'STATE':
      applyState(parts[1], parseInt(parts[2]), parts[3], parts[4]);
      break;

    case 'YOUR_TURN':
      state.myTurn = true;
      clearSelection();
      setStatus('Your turn — click a piece', 'your-turn');
      break;

    case 'WAIT_TURN':
      state.myTurn = false;
      clearSelection();
      setStatus('Waiting for opponent...');
      break;

    case 'GAME_OVER':
      state.gameOver = true;
      state.myTurn = false;
      clearSelection();
      renderBoard();
      setStatus(parts[2] || 'Game over');
      break;

    case 'OPPONENT_DC':
      setStatus('Opponent disconnected, waiting...');
      break;

    case 'REJOINED':
      state.playerNum = parseInt(parts[1]);
      document.getElementById('pnum').textContent = parts[1];
      if (parts[2] && parts[2].length === 64)
        applyState(parts[2], parseInt(parts[3]), parts[4], parts[5]);
      setStatus('Reconnected as P' + parts[1]);
      break;

    case 'ERR':
      setStatus(parts[1] || 'Error', 'error');
      clearSelection();
      renderBoard();
      break;
  }
}

// Parse board string and re-render
function applyState(board64, turn, p1name, p2name) {
  for (let r = 0; r < 8; r++)
    for (let c = 0; c < 8; c++)
      state.board[r][c] = parseInt(board64[r * 8 + c]);
  clearSelection();
  renderBoard();
}

// Compute likely valid moves for a piece (UX only — server re-validates)
function getMovesForPiece(row, col) {
  const cell = state.board[row][col];
  if (!cell) return [];
  const isKing = cell === 3 || cell === 4;
  const player = (cell === 1 || cell === 3) ? 1 : 2;
  const dirs   = isKing ? [-1, 1] : (player === 1 ? [-1] : [1]);
  const moves = [], captures = [];

  for (const dr of dirs) {
    for (const dc of [-1, 1]) {
      const nr = row + dr, nc = col + dc;
      if (nr < 0 || nr > 7 || nc < 0 || nc > 7) continue;
      if (state.board[nr][nc] === 0) {
        moves.push({row: nr, col: nc});
      } else {
        const mid = state.board[nr][nc];
        const isOpp = player === 1 ? (mid === 2 || mid === 4) : (mid === 1 || mid === 3);
        const lr = row + 2*dr, lc = col + 2*dc;
        if (isOpp && lr >= 0 && lr < 8 && lc >= 0 && lc < 8 && state.board[lr][lc] === 0)
          captures.push({row: lr, col: lc});
      }
    }
  }
  return captures.length > 0 ? captures : moves;
}

// Render the board grid
function renderBoard() {
  const boardEl = document.getElementById('board');
  boardEl.innerHTML = '';
  const destSet = new Set(state.validDests.map(d => d.row + ',' + d.col));

  for (let r = 0; r < 8; r++) {
    const rowEl = document.createElement('div');
    rowEl.className = 'board-row';

    const lbl = document.createElement('div');
    lbl.className = 'row-label';
    lbl.textContent = r;
    rowEl.appendChild(lbl);

    for (let c = 0; c < 8; c++) {
      const cell = document.createElement('div');
      const dark = (r + c) % 2 === 0;
      cell.className = 'cell ' + (dark ? 'dark' : 'light');

      if (state.selectedRow === r && state.selectedCol === c) cell.classList.add('selected-sq');
      if (destSet.has(r + ',' + c)) {
        cell.classList.add('valid-move');
        cell.onclick = () => onDestClick(r, c);
      }

      const val = state.board[r][c];
      if (val !== 0) {
        const piece = document.createElement('div');
        piece.className = 'piece ' + ((val === 1 || val === 3) ? 'p1' : 'p2');
        if (val === 3 || val === 4) piece.classList.add('king');
        if (state.selectedRow === r && state.selectedCol === c) piece.classList.add('selected');
        piece.onclick = e => { e.stopPropagation(); onPieceClick(r, c); };
        cell.appendChild(piece);
      }

      rowEl.appendChild(cell);
    }
    boardEl.appendChild(rowEl);
  }
}

// Select a piece and highlight its valid destinations
function onPieceClick(row, col) {
  if (!state.myTurn || state.gameOver) return;
  const cell = state.board[row][col];
  const mine = state.playerNum === 1 ? (cell === 1 || cell === 3) : (cell === 2 || cell === 4);
  if (!mine) { setStatus('Not your piece', 'error'); return; }

  state.selectedRow = row;
  state.selectedCol = col;
  state.validDests  = getMovesForPiece(row, col);
  renderBoard();
}

// Send the move when player clicks a destination
function onDestClick(row, col) {
  if (state.selectedRow < 0 || !state.myTurn) return;
  send('MOVE|' + state.selectedRow + '|' + state.selectedCol + '|' + row + '|' + col);
  clearSelection();
  renderBoard();
}

function clearSelection() {
  state.selectedRow = -1;
  state.selectedCol = -1;
  state.validDests  = [];
}

function setStatus(msg, type) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = type || '';
}

renderBoard();
</script>
</body>
</html>
